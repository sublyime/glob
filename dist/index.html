<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Futuristic Globe Heatmap</title>

    <link rel="stylesheet" crossorigin href="/assets/index-MY2SDlCm.css">

  <body>
    <div id="app">
      <div id="sidebar">
        <h1>Futuristic Globe</h1>
        <div class="controls">
          <label>Data URL</label>
          <input id="dataUrl" type="text" placeholder="/data/airports_delay.json" />
          <label>Lat key</label>
          <input id="latKey" type="text" value="lat" />
          <label>Lng key</label>
          <input id="lngKey" type="text" value="lng" />
          <label>Weight key</label>
          <input id="weightKey" type="text" value="weight" />
          <div class="buttons">
            <button id="loadBtn">Load</button>
            <select id="preset">
              <option value="airports">Airports - delays (example)</option>
            </select>
          </div>
          <small class="muted">Tip: provide a JSON URL returning an array of objects with lat/lng/weight fields.</small>
        </div>
      </div>
      <div id="globe-container"></div>
    </div>
  </body>
